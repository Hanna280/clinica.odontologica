<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Odontológica</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #0d6efd, #6ea8fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-login{
            width:400px;
            border:none;
            border-radius:20px;
            padding:30px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.2);
            background:white;
        }

        .titulo{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
            color:#0d6efd;
        }

    </style>

</head>
<body>

<div class="card-login">

    <h1 class="titulo">
        Clínica Odontológica
    </h1>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email"
            class="form-control mb-3"
        >

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            class="form-control mb-3"
        >

        <button class="btn btn-primary w-100">
            Entrar
        </button>

    </form>

</div>

</body>
</html>
